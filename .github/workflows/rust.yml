      # - name: Install nightly toolchain for minimum_versions
      #   uses: dtolnay/rust-toolchain@nightly

      # - uses: taiki-e/install-action@cargo-hack

      # - uses: taiki-e/install-action@cargo-minimal-versions

      # - name: Run cargo-minimal-versions
      #   id: minimum_versions
      #   continue-on-error: true
      #   run: /bin/bash ./scripts/ci/minimum_versions.sh 2>&1 | tee minimum-versions-output.txt


      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const script = require('./scripts/ci-comment-on-failure.js')
            script({github, context, octokit, fs})
      


  stable_tests:
    env: 
      SQLX_OFFLINE: true
    runs-on: ${{ matrix.os }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - run: rustup toolchain install stable --profile minimal --no-self-update

      - uses: Swatinem/rust-cache@v2
        with: 
          key: "(${{ matrix.os }})"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
        
      - name: Run tests
        run: cargo nextest run --all-features