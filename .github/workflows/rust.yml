name: Rust

on:
  pull_request:
    branches: [ "master*", "develop", "develop*" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  checks:
    env: 
      SQLX_OFFLINE: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pre-build devShell
        run: nix build --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default

      - uses: Swatinem/rust-cache@v2

      # ====================
      #       Fmt
      # ====================

      - name: Run rustfmt
        id: rustfmt
        continue-on-error: true
        run: cargo fmt --all --check 2>&1 | tee rustfmt-output.txt

      # # ====================
      # #       Clippy
      # # ====================

      # - name: Clippy no features
      #   id: clippy_no_features
      #   continue-on-error: true
      #   shell: 'nix develop -c bash -e {0}'
      #   run: cargo hack clippy --no-default-features -- -D warnings 2>&1 | tee clippy-no-features-output.txt

      # - name: Run clippy all features
      #   id: clippy
      #   continue-on-error: true
      #   shell: 'nix develop -c bash -e {0}'
      #   run: cargo hack clippy --all-features -- -D warnings 2>&1 | tee clippy-output.txt

      # # ====================
      # #       Docs
      # # ====================

      # - name: Documentation
      #   id: docs
      #   continue-on-error: true
      #   env:
      #     RUSTDOCFLAGS: -Dwarnings
      #   run: cargo doc --all-features --no-deps --document-private-items 2>&1 | tee docs-output.txt

      # # ====================
      # #     MSRV Check
      # # ====================

      # - name: Run cargo-msrv
      #   id: msrv
      #   continue-on-error: true
      #   run: /bin/bash ./scripts/ci/msrv.sh 2>&1 | tee msrv-output.txt

      # # ====================
      # #    Useless deps
      # # ====================

      # - name: Run cargo-machete
      #   id: dependancies
      #   continue-on-error: true
      #   run: /bin/bash ./scripts/ci/udeps.sh 2>&1 | tee dependancies-output.txt

      # # ====================
      # #    Min versions
      # # ====================

      # - name: Install nightly toolchain for minimum_versions
      #   uses: dtolnay/rust-toolchain@nightly

      # - uses: taiki-e/install-action@cargo-hack

      # - uses: taiki-e/install-action@cargo-minimal-versions

      # - name: Run cargo-minimal-versions
      #   id: minimum_versions
      #   continue-on-error: true
      #   run: /bin/bash ./scripts/ci/minimum_versions.sh 2>&1 | tee minimum-versions-output.txt


      # Consolidated error reporting
      - name: Comment on PR if any check failed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const checkOutputFiles = [
              { name: 'Clippy (no features)', file: 'clippy-no-features-output.txt' },
              { name: 'Clippy (all features)', file: 'clippy-output.txt' },
              { name: 'Documentation', file: 'docs-output.txt' },
              { name: 'Rustfmt', file: 'rustfmt-output.txt' },
              { name: 'MSRV', file: 'msrv-output.txt' },
              { name: 'Minimum Versions', file: 'minimum-versions-output.txt' },
              { name: 'Dependencies', file: 'dependancies-output.txt' }
            ];
            
            let failureMessage = '❌ **CI Checks Failed**\n\n';
            let hasFailures = false;
            
            for (const check of checkOutputFiles) {
              try {
                if (fs.existsSync(check.file)) {
                  const output = fs.readFileSync(check.file, 'utf8');
                  if (output.trim()) {
                    failureMessage += `<details>\n<summary><b>${check.name}</b></summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>\n\n`;
                    hasFailures = true;
                  }
                }
              } catch (err) {
                console.log(`Could not read ${check.file}: ${err.message}`);
              }
            }
            
            if (hasFailures) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: failureMessage
              });

              throw new Error('CI checks failed. See PR comment for details.');
            }

  stable_tests:
    env: 
      SQLX_OFFLINE: true
    runs-on: ${{ matrix.os }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - run: rustup toolchain install stable --profile minimal --no-self-update

      - uses: Swatinem/rust-cache@v2
        with: 
          key: "(${{ matrix.os }})"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
        
      - name: Run tests
        run: cargo nextest run --all-features